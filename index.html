<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersuite Market-Ready Demo</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Password Gate -->
<div id="password-screen">
  <h2>Enter Demo Password</h2>
  <input type="password" id="demo-pass" placeholder="Password">
  <button id="unlock-btn">Enter</button>
  <p id="pass-error" style="color:red;display:none;">Incorrect Password</p>
</div>

<!-- Builder Screen -->
<div id="builder-screen" style="display:none;">
<header>
  <h1>Supersuite Builder</h1>
  <button id="generate-btn">It’s Go Time</button>
</header>

<aside id="templates">
  <h3>Template Styles</h3>
  <button onclick="setTemplate('glass')">Ultra Modern Liquid Glass</button>
  <button onclick="setTemplate('classy')">Classy Bold Scrollytelling</button>
  <button onclick="setTemplate('custom')">Custom Bold CSS</button>
  <hr>
  <h3>Fonts</h3>
  <select id="font-select" onchange="updateSelectedFont(this.value)">
    <option value="Roboto">Roboto</option>
    <option value="Montserrat">Montserrat</option>
    <option value="Arial">Arial</option>
    <option value="Times New Roman">Times New Roman</option>
    <option value="Courier New">Courier New</option>
  </select>
</aside>

<main>
  <section id="blocks">
    <h3>Revenue Blocks</h3>
    <button onclick="addBlock('hero')">Hero Section</button>
    <button onclick="addBlock('lead')">Lead Form</button>
    <button onclick="addBlock('testimonials')">Testimonials</button>
    <button onclick="addBlock('services')">Services Grid</button>
    <button onclick="addBlock('cta')">Call-to-Action</button>
    <hr>
    <h3>Styling</h3>
    <label>Text Color <input type="color" id="text-color" onchange="updateSelectedStyle('color', this.value)"></label>
    <label>Background Color <input type="color" id="bg-color" onchange="updateSelectedStyle('backgroundColor', this.value)"></label>
    <label>Font Size <input type="range" min="12" max="72" id="font-size" onchange="updateSelectedStyle('fontSize', this.value+'px')"></label>
  </section>

  <section id="preview">
    <iframe id="site-preview"></iframe>
  </section>
</main>

</div>

<script src="script.js"></script>
</body>
</html>
